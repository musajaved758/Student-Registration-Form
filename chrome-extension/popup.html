<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-width: 320px;
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }
    .student-counter {
      display: inline-block;
      margin-top: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 600;
    }
    .quick-filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .filter-btn {
      width: auto;
      margin-bottom: 0;
      padding: 8px;
      background: #e2e8f0;
      color: #1f2937;
      font-size: 12px;
      font-weight: 600;
    }
    .filter-btn:hover {
      background: #cbd5e1;
    }
    .filter-btn.active {
      background: #1d4ed8;
      color: #fff;
    }
    .top-action-button {
      width: auto;
      min-width: 200px;
      margin: 10px auto 0;
      padding: 8px 12px;
      display: block;
      background: #0f766e;
      font-size: 13px;
    }
    .top-action-button:hover {
      background: #0d5f58;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      margin-bottom: 10px;
    }
    button:hover {
      background: #4338CA;
    }
    .status {
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 12px;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .data-list {
      max-height: 350px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .data-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    .data-item:hover {
      background: #f0f0f0;
    }
    .data-item.selected {
      background: #e8f4f8;
      border-left: 3px solid #4F46E5;
    }
    .data-item:last-child {
      border-bottom: none;
    }
    .student-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .student-name {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    .student-cnic {
      font-size: 12px;
      color: #666;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .student-details, .student-academic {
      font-size: 11px;
      color: #666;
      display: flex;
      gap: 12px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .student-academic {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed #ddd;
    }
    .student-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .student-main {
      flex: 1;
      min-width: 0;
    }
    .done-toggle {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #64748b;
      font-size: 14px;
      line-height: 1;
      margin: 0;
      padding: 0;
      cursor: pointer;
    }
    .done-toggle:hover {
      border-color: #16a34a;
      color: #16a34a;
      background: #f0fdf4;
    }
    .done-toggle.is-done {
      border-color: #16a34a;
      background: #16a34a;
      color: #fff;
    }
    .data-item.done {
      border-left: 3px solid #16a34a;
      background: #f8fff9;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon_logo.png" alt="Logo" class="logo">
    <h3>Form Auto-Filler</h3>
    <div id="studentCounter" class="student-counter">Total Students = 0</div>
    <button id="downloadCsv" class="top-action-button" type="button">Download Students CSV</button>
  </div>

  <div class="quick-filters">
    <button id="filterAll" class="filter-btn active" type="button">All Students</button>
    <button id="filterDone" class="filter-btn" type="button">Done</button>
    <button id="filterRemaining" class="filter-btn" type="button">Remaining</button>
  </div>

  <div class="form-group">
    <label for="searchInput">Search Student:</label>
    <input type="text" id="searchInput" placeholder="Enter name or email...">
  </div>

  <div id="studentList" class="data-list" style="display: none;">
    <!-- Student data will be populated here -->
  </div>

  <button id="fetchData">Fetch Student Data</button>
  <button id="fillForm" style="display: none;">Fill Form</button>
  <button id="clearData">Clear Data</button>

  <div id="status" class="status" style="display: none;"></div>

  <script src="popup.js"></script>
</body>
</html>
